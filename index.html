<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Ferry Trip Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <span style="font-size:24px;display:inline-flex;flex-direction:column;align-items:center;line-height:1">⛴<svg width="24" height="6" viewBox="0 0 24 6" style="margin-top:-2px"><path d="M0 3c3-2.5 5-2.5 8 0s5 2.5 8 0 5-2.5 8 0" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></span>
  <h1>NYC Ferry Trip Planner</h1>
</header>

<div class="controls">
  <label for="from-select">From</label>
  <select id="from-select"><option value="">Loading...</option></select>
  <button id="swap-btn" title="Swap origin and destination">&#8646;</button>
  <label for="to-select">To</label>
  <select id="to-select"><option value="">Loading...</option></select>
  <label for="date-input">Date</label>
  <input type="date" id="date-input">
  <select id="time-mode">
    <option value="depart">Depart at</option>
    <option value="arrive">Arrive by</option>
  </select>
  <input type="time" id="time-input">
  <button id="go-btn">Go</button>
</div>

<div id="main">
  <div id="map"></div>
  <div id="directions"></div>
</div>

<script src="app.js"></script>
</body>
</html>
