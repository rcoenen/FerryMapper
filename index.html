<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Ferry Trip Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <svg width="34" height="30" viewBox="0 0 34 28" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- hull - side view with pointed bow on right -->
    <path d="M3 20h22l5-4H7z"/>
    <!-- cabin -->
    <rect x="8" y="11" width="14" height="5" rx="1"/>
    <!-- cabin windows -->
    <circle cx="12" cy="13.5" r="1" fill="white" stroke="none"/>
    <circle cx="16" cy="13.5" r="1" fill="white" stroke="none"/>
    <circle cx="20" cy="13.5" r="1" fill="white" stroke="none"/>
    <!-- funnel/smokestack -->
    <rect x="10" y="6" width="3" height="5" rx="0.5"/>
    <!-- wavy water -->
    <path d="M1 24c2.5-1.5 5-1.5 7.5 0s5 1.5 7.5 0 5-1.5 7.5 0 5 1.5 7.5 0"/>
  </svg>
  <h1>NYC Ferry Trip Planner</h1>
</header>

<div class="controls">
  <label for="from-select">From</label>
  <select id="from-select"><option value="">Loading...</option></select>
  <button id="swap-btn" title="Swap origin and destination">&#8646;</button>
  <label for="to-select">To</label>
  <select id="to-select"><option value="">Loading...</option></select>
  <label for="date-input">Date</label>
  <input type="date" id="date-input">
  <select id="time-mode">
    <option value="depart">Depart at</option>
    <option value="arrive">Arrive by</option>
  </select>
  <input type="time" id="time-input">
  <button id="go-btn">Go</button>
</div>

<div id="main">
  <div id="map"></div>
  <div id="directions"></div>
</div>

<script src="app.js"></script>
</body>
</html>
