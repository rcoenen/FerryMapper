name: Refresh ferry data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Download and process GTFS data
        run: npm run prepare-data

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ferry-data.json
          if git diff --cached --quiet; then
            echo "No changes to ferry data, skipping commit."
          else
            git commit -m "Refresh ferry data $(date -u '+%Y-%m-%d')"
            git push
          fi
